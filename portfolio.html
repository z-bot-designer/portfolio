<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人作品集</title>
    <style>
/* ===== 基础重置与变量 ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --primary-light: #e0e7ff;
    --secondary: #0f172a;
    --accent: #06b6d4;
    --bg: #f8fafc;
    --bg-card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: all 0.3s ease;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

a {
    text-decoration: none;
    color: inherit;
}

img {
    max-width: 100%;
    display: block;
}

/* ===== 导航栏 ===== */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    transition: var(--transition);
}

.nav-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 64px;
}

.nav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--primary);
    transition: var(--transition);
}

.logo-icon {
    font-size: 1.5rem;
    color: var(--accent);
}

.nav-logo:hover {
    color: var(--primary-dark);
}

.nav-menu {
    display: flex;
    list-style: none;
    gap: 8px;
}

.nav-link {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-light);
    transition: var(--transition);
    position: relative;
}

.nav-link:hover,
.nav-link.active {
    color: var(--primary);
    background: var(--primary-light);
}

.hamburger {
    display: none;
    cursor: pointer;
}

.bar {
    display: block;
    width: 24px;
    height: 2px;
    margin: 5px 0;
    background: var(--text);
    border-radius: 2px;
    transition: var(--transition);
}

/* ===== 主内容区 ===== */
#app {
    padding-top: 64px;
    min-height: 100vh;
}

.page-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== 首页 Hero ===== */
.hero {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 64px);
    padding: 60px 24px;
    text-align: center;
    background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg) 100%);
}

.hero-content {
    max-width: 640px;
}

.hero-avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: white;
    margin: 0 auto 24px;
    box-shadow: var(--shadow-lg);
}

.hero-title {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.hero-subtitle {
    font-size: 1.15rem;
    color: var(--text-light);
    margin-bottom: 32px;
    line-height: 1.7;
}

.hero-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 32px;
}

.stat-item {
    text-align: center;
}

.stat-number {
    font-size: 2rem;
    font-weight: 700;
    color: var(--primary);
}

.stat-label {
    font-size: 0.875rem;
    color: var(--text-light);
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: var(--transition);
}

.btn-primary {
    background: var(--primary);
    color: white;
    box-shadow: var(--shadow);
}

.btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

.btn-secondary {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
    margin-left: 12px;
}

.btn-secondary:hover {
    background: var(--primary-light);
}

.btn-danger {
    background: #ef4444;
    color: white;
}

.btn-danger:hover {
    background: #dc2626;
}

.btn-sm {
    padding: 6px 14px;
    font-size: 0.875rem;
}

/* ===== 作品展示页 ===== */
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
}

.page-title {
    font-size: 1.75rem;
    font-weight: 700;
}

.filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
    color: var(--text-light);
    font-size: 0.875rem;
    cursor: pointer;
    transition: var(--transition);
}

.filter-btn:hover,
.filter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

/* 作品网格 */
.works-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
}

.work-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: var(--transition);
    cursor: pointer;
    position: relative;
}

.work-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.work-card-image {
    width: 100%;
    height: 220px;
    object-fit: cover;
    transition: var(--transition);
}

.work-card:hover .work-card-image {
    transform: scale(1.05);
}

.work-card-body {
    padding: 20px;
}

.work-card-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.work-card-desc {
    font-size: 0.875rem;
    color: var(--text-light);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    margin-bottom: 12px;
    line-height: 1.5;
}

.work-card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--text-light);
}

.work-card-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 0.75rem;
    font-weight: 500;
}

.work-card-actions {
    display: flex;
    gap: 8px;
    position: absolute;
    top: 12px;
    right: 12px;
    opacity: 0;
    transition: var(--transition);
}

.work-card:hover .work-card-actions {
    opacity: 1;
}

.action-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.9);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.875rem;
    transition: var(--transition);
    backdrop-filter: blur(4px);
}

.action-btn:hover {
    background: var(--primary);
    color: white;
}

/* 空状态 */
.empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-light);
}

.empty-state-icon {
    font-size: 4rem;
    margin-bottom: 16px;
    opacity: 0.5;
}

.empty-state-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
}

/* ===== 上传页 ===== */
.upload-container {
    max-width: 640px;
    margin: 0 auto;
}

.upload-form {
    background: var(--bg-card);
    padding: 32px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
}

.form-group {
    margin-bottom: 24px;
}

.form-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
}

.form-label span {
    color: #ef4444;
    margin-left: 2px;
}

.form-input,
.form-textarea,
.form-select {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-family: inherit;
    transition: var(--transition);
    background: var(--bg);
}

.form-input:focus,
.form-textarea:focus,
.form-select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
}

.form-textarea {
    resize: vertical;
    min-height: 120px;
}

/* 图片上传区 */
.upload-dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    background: var(--bg);
}

.upload-dropzone:hover,
.upload-dropzone.dragover {
    border-color: var(--primary);
    background: var(--primary-light);
}

.upload-dropzone-icon {
    font-size: 3rem;
    margin-bottom: 12px;
    color: var(--text-light);
}

.upload-dropzone-text {
    color: var(--text-light);
    font-size: 0.95rem;
}

.upload-dropzone-text span {
    color: var(--primary);
    font-weight: 600;
}

.upload-preview {
    margin-top: 16px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    max-height: 300px;
    display: none;
    position: relative;
}

.upload-preview img {
    width: 100%;
    object-fit: cover;
}

.upload-preview.active {
    display: block;
}

.upload-preview-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(239,68,68,0.9);
    color: white;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== 弹窗 Modal ===== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
}

.modal.active {
    display: flex;
}

.modal-content {
    background: var(--bg-card);
    border-radius: var(--radius);
    max-width: 800px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.3s ease;
}

@keyframes modalIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.modal-close {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 1.75rem;
    cursor: pointer;
    color: var(--text-light);
    z-index: 10;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: var(--transition);
}

.modal-close:hover {
    background: var(--bg);
    color: var(--text);
}

.modal-body {
    padding: 0;
}

.modal-image {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: var(--radius) var(--radius) 0 0;
}

.modal-info {
    padding: 28px;
}

.modal-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
}

.modal-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    font-size: 0.875rem;
    color: var(--text-light);
    flex-wrap: wrap;
}

.modal-desc {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
}

/* ===== Toast ===== */
.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--secondary);
    color: white;
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    z-index: 3000;
    opacity: 0;
    transition: var(--transition);
    box-shadow: var(--shadow-lg);
}

.toast.active {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

.toast.success { background: #10b981; }
.toast.error { background: #ef4444; }

/* ===== 页脚 ===== */
.footer {
    text-align: center;
    padding: 24px;
    color: var(--text-light);
    font-size: 0.875rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
}

/* ===== 响应式设计 ===== */
@media (max-width: 768px) {
    .nav-menu {
        position: fixed;
        top: 64px;
        left: -100%;
        flex-direction: column;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(12px);
        width: 100%;
        text-align: center;
        padding: 20px;
        gap: 8px;
        border-bottom: 1px solid var(--border);
        transition: var(--transition);
    }

    .nav-menu.active {
        left: 0;
    }

    .hamburger {
        display: block;
    }

    .hamburger.active .bar:nth-child(1) {
        transform: rotate(-45deg) translate(-5px, 5px);
    }

    .hamburger.active .bar:nth-child(2) {
        opacity: 0;
    }

    .hamburger.active .bar:nth-child(3) {
        transform: rotate(45deg) translate(-5px, -5px);
    }

    .hero-title {
        font-size: 1.75rem;
    }

    .hero-stats {
        gap: 24px;
    }

    .works-grid {
        grid-template-columns: 1fr;
    }

    .page-header {
        flex-direction: column;
        align-items: flex-start;
    }

    .upload-form {
        padding: 20px;
    }

    .btn-secondary {
        margin-left: 0;
        margin-top: 8px;
    }

    .hero-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .hero-buttons .btn-secondary {
        margin: 0;
    }
}

/* ===== 动画 ===== */
@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.work-card {
    animation: slideUp 0.5s ease backwards;
}

.work-card:nth-child(1) { animation-delay: 0.05s; }
.work-card:nth-child(2) { animation-delay: 0.1s; }
.work-card:nth-child(3) { animation-delay: 0.15s; }
.work-card:nth-child(4) { animation-delay: 0.2s; }
.work-card:nth-child(5) { animation-delay: 0.25s; }
.work-card:nth-child(6) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo" data-page="home">
                <span class="logo-icon">&#9670;</span>
                <span>我的作品集</span>
            </a>
            <ul class="nav-menu">
                <li><a href="#" class="nav-link active" data-page="home">首页</a></li>
                <li><a href="#" class="nav-link" data-page="portfolio">作品展示</a></li>
                <li><a href="#" class="nav-link" data-page="upload">上传作品</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main id="app"></main>

    <!-- 作品详情弹窗 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-body"></div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <script>
// ===== 数据存储 =====
const STORAGE_KEY = 'portfolio_works';

function getWorks() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
    } catch {
        return [];
    }
}

function saveWorks(works) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(works));
}

// 初始化示例数据
function initDemoData() {
    const works = getWorks();
    if (works.length === 0) {
        const demoWorks = [
            {
                id: 'demo-1',
                title: '山间晨曦',
                description: '清晨的山谷被薄雾笼罩，阳光穿透云层洒在连绵的山峦上，金色的光芒与青黛色的山体形成绝美的对比。这是我在海拔2800米处守候三天拍摄的珍贵瞬间。',
                category: '摄影',
                image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',
                date: '2024-11-15',
                isExternal: true
            },
            {
                id: 'demo-2',
                title: '城市夜景',
                description: '繁华都市的霓虹夜景，车水马龙的光轨交织成一幅流动的画卷。长时间曝光捕捉城市脉动，展现现代都市的活力与魅力。',
                category: '摄影',
                image: 'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=800&q=80',
                date: '2024-10-22',
                isExternal: true
            },
            {
                id: 'demo-3',
                title: '极简品牌设计',
                description: '为一家新兴咖啡品牌打造的视觉识别系统，从Logo到包装的整体设计，以简约的几何图形和暖色调传达温馨与品质。',
                category: '设计',
                image: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=800&q=80',
                date: '2024-09-08',
                isExternal: true
            },
            {
                id: 'demo-4',
                title: '手绘插画集',
                description: '《四季》系列水彩插画，以细腻的笔触描绘春夏秋冬的更迭，每幅作品耗时约40小时，展现自然之美与时间的流转。',
                category: '插画',
                image: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=800&q=80',
                date: '2024-08-30',
                isExternal: true
            },
            {
                id: 'demo-5',
                title: '个人网站设计',
                description: '为自由摄影师打造的个人作品展示网站，采用极简风格与大量留白，让作品本身成为视觉焦点。响应式设计适配各种设备。',
                category: '设计',
                image: 'https://images.unsplash.com/photo-1467232004584-a241de8bcf5d?w=800&q=80',
                date: '2024-07-12',
                isExternal: true
            },
            {
                id: 'demo-6',
                title: '海边日落',
                description: '太平洋海岸的壮丽日落，金色的夕阳将海面染成一片橙红，浪花拍打着礁石，海鸥在余晖中翱翔。',
                category: '摄影',
                image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80',
                date: '2024-06-20',
                isExternal: true
            }
        ];
        saveWorks(demoWorks);
    }
}

// ===== 工具函数 =====
function generateId() {
    return 'work-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
}

function formatDate(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
}

function showToast(message, type) {
    type = type || 'success';
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type;
    setTimeout(function() { toast.classList.add('active'); }, 10);
    setTimeout(function() {
        toast.classList.remove('active');
    }, 3000);
}

// ===== 页面渲染 =====
const app = document.getElementById('app');
let currentPage = 'home';
let currentFilter = '全部';

function renderPage(page) {
    currentPage = page;
    app.innerHTML = '';

    switch (page) {
        case 'home':
            renderHome();
            break;
        case 'portfolio':
            renderPortfolio();
            break;
        case 'upload':
            renderUpload();
            break;
    }

    document.querySelectorAll('.nav-link').forEach(function(link) {
        link.classList.toggle('active', link.dataset.page === page);
    });
}

// 首页
function renderHome() {
    const works = getWorks();
    const categories = [];
    works.forEach(function(w) {
        if (categories.indexOf(w.category) === -1) categories.push(w.category);
    });

    app.innerHTML = '<section class="hero">' +
        '<div class="hero-content">' +
            '<div class="hero-avatar">我</div>' +
            '<h1 class="hero-title">创作者作品集</h1>' +
            '<p class="hero-subtitle">这里记录着我的创作历程与灵感瞬间。<br>摄影、设计、插画 — 用作品讲述故事。</p>' +
            '<div class="hero-stats">' +
                '<div class="stat-item"><div class="stat-number">' + works.length + '</div><div class="stat-label">作品数量</div></div>' +
                '<div class="stat-item"><div class="stat-number">' + categories.length + '</div><div class="stat-label">创作类别</div></div>' +
            '</div>' +
            '<div class="hero-buttons">' +
                '<button class="btn btn-primary" onclick="renderPage(\'portfolio\')">浏览作品 &#8594;</button>' +
                '<button class="btn btn-secondary" onclick="renderPage(\'upload\')">上传作品</button>' +
            '</div>' +
        '</div>' +
    '</section>';
}

// 作品展示页
function renderPortfolio() {
    const works = getWorks();
    const categories = ['全部'];
    works.forEach(function(w) {
        if (categories.indexOf(w.category) === -1) categories.push(w.category);
    });

    const filteredWorks = currentFilter === '全部' 
        ? works 
        : works.filter(function(w) { return w.category === currentFilter; });

    let worksHtml = '';
    if (filteredWorks.length === 0) {
        worksHtml = '<div class="empty-state">' +
            '<div class="empty-state-icon">&#127912;</div>' +
            '<div class="empty-state-title">暂无作品</div>' +
            '<p>该分类下还没有作品，快去上传你的第一件作品吧！</p><br>' +
            '<button class="btn btn-primary" onclick="renderPage(\'upload\')">上传作品</button>' +
        '</div>';
    } else {
        worksHtml = '<div class="works-grid">' +
            filteredWorks.map(function(work) {
                return '<div class="work-card" onclick="openModal(\'' + work.id + '\')">' +
                    '<div style="overflow: hidden; position: relative;">' +
                        '<img class="work-card-image" src="' + work.image + '" alt="' + work.title + '" loading="lazy">' +
                        '<div class="work-card-actions" onclick="event.stopPropagation()">' +
                            '<button class="action-btn" onclick="deleteWork(\'' + work.id + '\')" title="删除">&#128465;</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="work-card-body">' +
                        '<h3 class="work-card-title">' + work.title + '</h3>' +
                        '<p class="work-card-desc">' + work.description + '</p>' +
                        '<div class="work-card-meta">' +
                            '<span class="work-card-tag">' + work.category + '</span>' +
                            '<span>' + formatDate(work.date) + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('') +
        '</div>';
    }

    app.innerHTML = '<section class="page-section">' +
        '<div class="page-header">' +
            '<h2 class="page-title">作品展示</h2>' +
            '<div class="filter-bar">' +
                categories.map(function(cat) {
                    return '<button class="filter-btn ' + (cat === currentFilter ? 'active' : '') + '" onclick="setFilter(\'' + cat + '\')">' + cat + '</button>';
                }).join('') +
            '</div>' +
        '</div>' +
        worksHtml +
    '</section>' +
    '<footer class="footer"><p>共 ' + filteredWorks.length + ' 件作品 · ' + works.length + ' 件总作品</p></footer>';
}

function setFilter(category) {
    currentFilter = category;
    renderPortfolio();
}

// 上传页

    const today = new Date().toISOString().split('T')[0];
    app.innerHTML = '<section class="page-section upload-container">' +
        '<div class="page-header"><h2 class="page-title">上传作品</h2></div>' +
        '<form class="upload-form" id="uploadForm" onsubmit="handleUpload(event)">' +
            '<div class="form-group">' +
                '<label class="form-label">作品图片 <span>*</span></label>' +
                '<div class="upload-dropzone" id="dropzone">' +
                    '<div class="upload-dropzone-icon">&#128247;</div>' +
                    '<p class="upload-dropzone-text">拖拽图片到此处，或 <span>点击选择</span></p>' +
                    '<p class="upload-dropzone-text" style="font-size: 0.8rem; margin-top: 8px;">支持 JPG、PNG、GIF、WebP 格式</p>' +
                    '<input type="file" id="fileInput" accept="image/*" style="display: none;">' +
                '</div>' +
                '<div class="upload-preview" id="preview">' +
                    '<img id="previewImg" src="" alt="预览">' +
                    '<button type="button" class="upload-preview-remove" onclick="clearImage()">&times;</button>' +
                '</div>' +
            '</div>' +
            '<div class="form-group">' +
                '<label class="form-label" for="title">作品标题 <span>*</span></label>' +
                '<input type="text" class="form-input" id="title" placeholder="给你的作品起个名字" required>' +
            '</div>' +
            '<div class="form-group">' +
                '<label class="form-label" for="category">分类 <span>*</span></label>' +
                '<select class="form-select" id="category" required>' +
                    '<option value="">选择分类</option>' +
                    '<option value="摄影">摄影</option>' +
                    '<option value="设计">设计</option>' +
                    '<option value="插画">插画</option>' +
                    '<option value="绘画">绘画</option>' +
                    '<option value="视频">视频</option>' +
                    '<option value="音乐">音乐</option>' +
                    '<option value="写作">写作</option>' +
                    '<option value="其他">其他</option>' +
                '</select>' +
            '</div>' +
            '<div class="form-group">' +
                '<label class="form-label" for="description">作品描述</label>' +
                '<textarea class="form-textarea" id="description" placeholder="介绍一下你的作品创作背景、灵感来源或技术细节..."></textarea>' +
            '</div>' +
            '<div class="form-group">' +
                '<label class="form-label" for="date">创作日期</label>' +
                '<input type="date" class="form-input" id="date" value="' + today + '">' +
            '</div>' +
            '<button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">发布作品</button>' +
        '</form>' +
    '</section>';

    setupUploadEvents();
}

// 上传事件绑定
let uploadedImage = null;

function setupUploadEvents() {
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');

    dropzone.addEventListener('click', function() { fileInput.click(); });

    dropzone.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', function() {
        dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', function(e) {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length) handleFile(files[0]);
    });

    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) {
            showToast('请选择图片文件', 'error');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedImage = e.target.result;
            previewImg.src = uploadedImage;
            preview.classList.add('active');
        };
        reader.readAsDataURL(file);
    }
}

function clearImage() {
    uploadedImage = null;
    document.getElementById('preview').classList.remove('active');
    document.getElementById('fileInput').value = '';
}

function handleUpload(e) {
    e.preventDefault();

    if (!uploadedImage) {
        showToast('请上传作品图片', 'error');
        return;
    }

    const title = document.getElementById('title').value.trim();
    const category = document.getElementById('category').value;
    const description = document.getElementById('description').value.trim();
    const date = document.getElementById('date').value;

    if (!title || !category) {
        showToast('请填写必填项', 'error');
        return;
    }

    const works = getWorks();
    works.unshift({
        id: generateId(),
        title: title,
        description: description || '暂无描述',
        category: category,
        image: uploadedImage,
        date: date || new Date().toISOString().split('T')[0],
        isExternal: false
    });

    saveWorks(works);
    showToast('作品上传成功！');

    document.getElementById('uploadForm').reset();
    clearImage();

    setTimeout(function() { renderPage('portfolio'); }, 1200);
}

// 删除作品
function deleteWork(id) {
    if (!confirm('确定要删除这件作品吗？此操作不可撤销。')) return;

    const works = getWorks().filter(function(w) { return w.id !== id; });
    saveWorks(works);
    showToast('作品已删除');
    renderPortfolio();
}

// 弹窗详情
function openModal(id) {
    const work = getWorks().find(function(w) { return w.id === id; });
    if (!work) return;

    const modal = document.getElementById('modal');
    const modalBody = document.querySelector('.modal-body');

    modalBody.innerHTML = '<img class="modal-image" src="' + work.image + '" alt="' + work.title + '">' +
        '<div class="modal-info">' +
            '<h2 class="modal-title">' + work.title + '</h2>' +
            '<div class="modal-meta">' +
                '<span class="work-card-tag">' + work.category + '</span>' +
                '<span>&#128197; ' + formatDate(work.date) + '</span>' +
            '</div>' +
            '<p class="modal-desc">' + work.description + '</p>' +
        '</div>';

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    const modal = document.getElementById('modal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
}

// ===== 导航与事件 =====
document.addEventListener('DOMContentLoaded', function() {
    initDemoData();
    renderPage('home');

    document.querySelectorAll('.nav-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const page = link.dataset.page;
            renderPage(page);
            document.querySelector('.nav-menu').classList.remove('active');
            document.querySelector('.hamburger').classList.remove('active');
        });
    });

    document.querySelector('.nav-logo').addEventListener('click', function(e) {
        e.preventDefault();
        renderPage('home');
    });

    document.querySelector('.hamburger').addEventListener('click', function() {
        document.querySelector('.nav-menu').classList.toggle('active');
        document.querySelector('.hamburger').classList.toggle('active');
    });

    document.querySelector('.modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target.id === 'modal') closeModal();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
});
    </script>
